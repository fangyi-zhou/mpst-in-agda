name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Setup Agda
      uses: wenkokke/setup-agda@v2.5.0
      with:
        agda-version: "2.7.0.1"
        agda-stdlib-version: "2.3"

    - name: Checkout my library
      uses: actions/checkout@v4
      with:
        path: main

    - name: Typecheck my library
      run: |
        cd main
        agda Everything.agda
